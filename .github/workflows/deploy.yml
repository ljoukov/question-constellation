name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm run check

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload Worker secrets
        run: |
          node -e "const fs=require('node:fs'); const required=['GOOGLE_SERVICE_ACCOUNT_JSON','GOOGLE_API_KEY','AUTH_COOKIE_SECRET']; const missing=required.filter((key)=>!process.env[key]); if (missing.length) { throw new Error('Missing Worker secrets: '+missing.join(', ')); } fs.writeFileSync('.worker-secrets.json', JSON.stringify(Object.fromEntries(required.map((key)=>[key, process.env[key]]))));"
          pnpm wrangler secret bulk .worker-secrets.json
          rm -f .worker-secrets.json
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          AUTH_COOKIE_SECRET: ${{ secrets.AUTH_COOKIE_SECRET }}

      - name: Deploy Worker
        run: pnpm wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
